<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JK_do</title>
  </head>
  <body>
    <h1>Bienvenue sur votre liste des choses à faire</h1>
    <div id="task-list">
      <input type="checkbox" id="task1" />
      <label for="task1">Tâche 1: Apprendre le HTML</label><br />
      <input type="checkbox" id="task2" />
      <label for="task2">Tâche 2: Apprendre le CSS</label><br />
      <input type="checkbox" id="task3" />
      <label for="task3">Tâche 3: Apprendre le JavaScript</label><br />
      <input type="text" placeholder="Saisissez votre tâche" />
      <button type="submit">Ajouter une tâche</button>
    </div>
    <script>
      // Votre code JavaScript ici
      const taskList = document.getElementById("task-list");
      const addButton = taskList.querySelector("button");
      const inputField = taskList.querySelector('input[type="text"]');
      addButton.addEventListener("click", () => {
        const taskText = inputField.value.trim();
        if (taskText !== "") {
          const taskId = `task${
            taskList.querySelectorAll('input[type="checkbox"]').length + 1
          }`;
          const newTaskCheckbox = document.createElement("input");
          newTaskCheckbox.type = "checkbox";
          newTaskCheckbox.id = taskId;

          const newTaskLabel = document.createElement("label");
          newTaskLabel.htmlFor = taskId;
          newTaskLabel.textContent = `Tâche ${
            taskList.querySelectorAll('input[type="checkbox"]').length + 1
          }: ${taskText}`;
          taskList.insertBefore(newTaskCheckbox, inputField);
          taskList.insertBefore(newTaskLabel, inputField);
          taskList.insertBefore(document.createElement("br"), inputField);
          inputField.value = "";
        }

        const checkboxes = taskList.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach((checkbox) => {
          if (checkbox.checked) {
            checkbox.remove();
          }
        });
      });
    </script>
  </body>
</html>
